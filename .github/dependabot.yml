version: 2
updates:
  # npm パッケージ更新（React, TypeScript, Electron 含む）
  - package-ecosystem: "npm"
    directory: "/" # ルートに package.json がある場合
    schedule:
      interval: "daily" # 3日に1回の指定は仕様上不可のため、最も近い「毎日」に設定
    open-pull-requests-limit: 20
    allow:
      - dependency-type: "all" # devDependenciesも含める
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "dependabot"
    rebase-strategy: auto
    target-branch: "dev"
    groups:
      # MUI関連パッケージをまとめる
      mui-stack:
        patterns:
          - "@mui/*"
          - "@emotion/*"
      # React関連パッケージをまとめる
      react-stack:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
          - "react-redux"
          - "react-resizable-panels"
      # Redux関連パッケージをまとめる
      redux-stack:
        patterns:
          - "@reduxjs/toolkit"
          - "redux"
      # テスト関連パッケージをまとめる
      test-stack:
        patterns:
          - "jest"
          - "jest-*"
          - "ts-jest"
          - "@testing-library/*"
          - "@types/jest"
          - "identity-obj-proxy"
      # Linter・Formatter関連パッケージをまとめる
      lint-stack:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
          - "@typescript-eslint/*"
          - "prettier"
          - "@trivago/prettier-plugin-sort-imports"
          - "lint-staged"
          - "husky"
      # TypeScript関連パッケージをまとめる
      typescript-stack:
        patterns:
          - "typescript"
          - "ts-node"
          - "@types/*"
      # Webpack関連パッケージをまとめる
      webpack-stack:
        patterns:
          - "webpack"
          - "webpack-cli"
          - "*-webpack-plugin"
          - "*-loader"
          - "mini-css-extract-plugin"
      # Electron関連パッケージをまとめる
      electron-stack:
        patterns:
          - "electron"
          - "electronmon"
          - "electron-*"
          - "@electron/*"
      # 開発ツール関連をまとめる
      dev-tools:
        patterns:
          - "rimraf"
          - "copyfiles"
          - "cross-env"
          - "npm-run-all"
          - "wait-on"
  
  # GitHub Actions の更新
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "dependabot"
    target-branch: "dev"
